<!doctype html>
<html>
  <head>
    <title>Product Cards</title>

    <style>
      body {
        font-family: Arial;
        background: #f2f2f2;
        margin: 0;
        padding: 20px;
      }

      /* Container */

      .container {
        display: flex;
        justify-content: center;
        gap: 30px;
      }

      /* Card */

      .card {
        background: white;
        width: 250px;
        border-radius: 10px;
        text-align: center;
        padding: 20px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      /* Image */

      .card img {
        width: 100%;
        height: 55dvh;
        border-radius: 10px;
      }

      /* Title */

      .card h3 {
        margin: 10px 0;
        color: darkblue;
      }

      /* Price */

      .price {
        color: green;
        font-size: 18px;
        margin-bottom: 10px;
      }

      /* Button */

      .card button {
        background: orange;
        color: white;
        border: none;
        padding: 10px 15px;
        border-radius: 5px;
        cursor: pointer;
      }

      /* Hover */

      .card:hover {
        transform: scale(1.05);
        transition: 0.3s;
      }

      .card button:hover {
        background: darkblue;
      }

      .code {
        margin-top: 40px;
      }

      pre {
        background: white;
        color: black;
        padding: 20px;
        border-radius: 8px;
        overflow: auto;

        font-size: 2rem;
      }
    </style>
  </head>

  <body>
    <a href="/css/index.html">Back</a><br />
    <h2 style="text-align: center">Our Products</h2>

    <div class="container">
      <!-- Product 1 -->

      <div class="card">
        <img
          src="../images/CSS/Projects/project-1/smartwatch.jpg"
          alt="product1"
        />
        <h3>Smart Watch</h3>
        <p class="price">$49</p>
        <button>Buy Now</button>
      </div>

      <!-- Product 2 -->

      <div class="card">
        <img
          src="../images/CSS/Projects/project-1/headphone.jpg"
          alt="product2"
        />
        <h3>Headphones</h3>
        <p class="price">$35</p>
        <button>Buy Now</button>
      </div>

      <!-- Product 3 -->

      <div class="card">
        <img src="../images/CSS/Projects/project-1/phone.jpg" alt="product3" />
        <h3>Mobile Phone</h3>
        <p class="price">$290</p>
        <button>Buy Now</button>
      </div>
    </div>

    <div class="code">
      <pre id="sourceCode"></pre>
    </div>

    <script>
      fetch(window.location.href)
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("sourceCode").textContent = data;
        });
    </script>
  </body>
</html>
