<!doctype html>
<html>
  <head>
    <title>Mobile Calculator</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      .main {
        height: 100vh;
        display: flex;

        justify-content: center;
        align-items: center;
        background: white;
      }

      .calculator {
        width: 320px;
        background: black;
        border-radius: 25px;
        padding: 20px;
        box-shadow: 0 0 25px rgba(0, 0, 0, 0.6);
      }

      .display {
        height: 70px;
        color: white;
        background: gray;
        border-radius: 20px;
        outline: none;
        width: 100%;
        text-align: right;
        display: flex;
        align-items: flex-end;
        justify-content: flex-end;
        padding: 5px;
        margin-bottom: 20px;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
      }

      button {
        height: 60px;
        border: none;
        border-radius: 50%;
        font-size: 22px;
        cursor: pointer;
      }

      .number {
        background: #333;
        color: white;
      }

      .operator {
        background: #ff9500;
        color: white;
      }

      .gray {
        background: #a5a5a5;
      }

      .zero {
        grid-column: span 2;
        border-radius: 40px;
        text-align: left;
        padding-left: 25px;
      }

      button:hover {
        opacity: 0.8;
      }

      .code {
        margin-top: 40px;
      }

      pre {
        background: white;
        color: black;
        padding: 20px;
        border-radius: 8px;
        overflow: auto;

        font-size: 2rem;
      }
    </style>
  </head>

  <body>
    <a href="/css/index.html">Back</a><br />
    <div class="main">
      <div class="calculator">
        <input type="text" name="text" id="text" class="display" />
        <div class="buttons">
          <button class="gray">AC</button>
          <button class="gray">C</button>
          <button class="gray">%</button>
          <button class="operator">÷</button>

          <button class="number">7</button>
          <button class="number">8</button>
          <button class="number">9</button>
          <button class="operator">×</button>

          <button class="number">4</button>
          <button class="number">5</button>
          <button class="number">6</button>
          <button class="operator">−</button>

          <button class="number">1</button>
          <button class="number">2</button>
          <button class="number">3</button>
          <button class="operator">+</button>

          <button class="number zero">0</button>
          <button class="number">.</button>
          <button class="operator">=</button>
        </div>
      </div>
    </div>

    <div class="code">
      <pre id="sourceCode"></pre>
    </div>

    <script>
      fetch(window.location.href)
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("sourceCode").textContent = data;
        });
    </script>
  </body>
</html>
